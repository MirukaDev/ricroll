<video id="v" autoplay muted playsinline style="width:100%; aspect-ratio:16/9; object-fit:cover;">
  <source src="video.mp4" type="video/mp4">
</video>

<script>
  const v = document.getElementById("v");

  document.addEventListener("click", () => {
    v.muted = false;
    v.play();
  }, { once: true });
</script>
